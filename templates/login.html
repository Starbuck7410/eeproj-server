<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision Core - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background:
                radial-gradient(circle at top left, #1f2a44 0%, transparent 35%),
                radial-gradient(circle at bottom right, #16213e 0%, transparent 30%),
                #0f111a;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: rgba(26, 29, 43, 0.95);
            border: 1px solid #2d3142;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        .brand-title {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: white;
        }

        .brand-title span {
            color: #0d6efd;
        }

        .brand-subtitle {
            color: #8b92a8;
            font-size: 0.95rem;
            margin-top: 8px;
        }

        .form-label {
            color: #c7cbe0;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .form-control {
            background: #11141f;
            border: 1px solid #2d3142;
            color: white;
            border-radius: 12px;
            padding: 14px;
        }

        .form-control:focus {
            background: #11141f;
            color: white;
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.2rem rgba(13,110,253,0.25);
        }

        .form-control::placeholder {
            color: #6c757d;
        }

        .btn-login {
            background: linear-gradient(135deg, #0d6efd, #3b82f6);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(13,110,253,0.3);
        }

        .status-row {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 20px;
            color: #8b92a8;
            font-size: 0.85rem;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff88;
            margin-right: 8px;
            box-shadow: 0 0 10px #00ff88;
        }

        .divider {
            height: 1px;
            background: #2d3142;
            margin: 30px 0;
        }

        .footer-text {
            text-align: center;
            color: #6c757d;
            font-size: 0.8rem;
            margin-top: 25px;
        }
    </style>
</head>

<body>

    <div class="login-container">

        <div class="login-card">

            <div class="text-center mb-4">
                <div class="brand-title">
                    VISION <span>CORE</span>
                </div>

                <div class="brand-subtitle">
                    Secure access to the monitoring dashboard
                </div>
            </div>

            <div class="divider"></div>

            <form action="/login" method="POST">

                <div class="mb-4">
                    <label class="form-label">Username</label>

                    <input
                        type="text"
                        class="form-control"
                        name="username"
                        placeholder="Enter username"
                        required
                    >
                </div>

                <div class="mb-4">
                    <label class="form-label">Password</label>

                    <input
                        type="password"
                        class="form-control"
                        name="password"
                        placeholder="Enter password"
                        required
                    >
                </div>

                <div class="mb-4"></div>

                <button type="submit" class="btn btn-primary btn-login w-100">
                    LOGIN TO SYSTEM
                </button>

            </form>


            <div class="footer-text">
                Electrical Engineering Project Lab © 2026
            </div>

        </div>

    </div>

</body>
</html>
