<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f111a; font-family: 'Inter', sans-serif; }
        .dashboard-container { margin-top: 20px; }
        .video-card { border: none; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .stat-card { border: none; border-radius: 12px; background: #1a1d2b; transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-5px); }
        .status-indicator { width: 12px; height: 12px; border-radius: 50%; display: inline-block; background: #ec1e1e; margin-right: 8px; box-shadow: 0 0 10px #ec1e1e; }
        .navbar { background: #161925 !important; border-bottom: 1px solid #2d3142; }
    </style>
    <script>

    async function updateStats() {
        try {
            const response = await fetch('/api/frame_stats');
            const data = await response.json();
            document.getElementById('fps-val').textContent = data.fps;
            document.getElementById('resolution-val').textContent = data.resolution;
            document.getElementById('status-indicator-text').textContent = data.online ? "SYSTEM ONLINE" : "SYSTEM OFFLINE";
            document.getElementById('garbage-id-val').textContent = data.garbage_id

            indicator = document.getElementById('status-indicator-ping');

            if (data.online) {
                indicator.style.background = "#00ff88";
                indicator.style.boxShadow = "0 0 10px #00ff88";
            } else {
                indicator.style.background = "#ec1e1e";
                indicator.style.boxShadow = "0 0 10px #ec1e1e";
            }

        } catch (error) {
            console.error('Failed to fetch stats:', error);
        }


        try {
            const response = await fetch('/api/garbage');
            const data = await response.json();
            document.getElementById('garbage-x').textContent = Math.round(data.x * 1000);
            document.getElementById('garbage-y').textContent = Math.round(data.y * 1000);
            document.getElementById('garbage-valid').textContent = data.valid ? "Yes" : "No";
        } catch (error) {
            console.error('Failed to fetch garbage location:', error);
        }


        try {
            const response = await fetch('/api/basket');
            const data = await response.json();
            document.getElementById('basket-x').textContent = Math.round(data.x * 1000);
            document.getElementById('basket-y').textContent = Math.round(data.y * 1000);
            document.getElementById('basket-valid').textContent = data.valid ? "Yes" : "No";
        } catch (error) {
            console.error('Failed to fetch basket location:', error);
        }
    }

    // Update immediately
    updateStats();

    // Update every second
    setInterval(updateStats, 500);

    </script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark px-4">
        <a class="navbar-brand fw-bold" href="#">VISION <span class="text-primary">CORE</span></a>
        <div class="ms-auto d-flex align-items-center">
            <span class="status-indicator" id="status-indicator-ping"></span>
            <span class="text-muted small" id="status-indicator-text">SYSTEM OFFLINE</span>
        </div>
    </nav>

    <div class="container-fluid dashboard-container">
        <div class="row px-3">
            <div class="col-lg-9 mb-4">
                <div class="card video-card">
                    <img id="video-feed" src="/video_feed" class="img-fluid w-100" alt="Video Stream">
                </div>
            </div>

            <div class="col-lg-3">
                <div class="card stat-card p-3 mb-3">
                    <h6 class="text-uppercase text-muted small fw-bold mb-3">Performance</h6>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="h4 mb-0" id="fps-val">0</span>
                        <span class="badge bg-secondary">FPS</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="h4 mb-0" id="resolution-val">0</span>
                        <span class="badge bg-secondary">Resolution</span>
                    </div>
                </div>
                <div class="card stat-card p-3 mb-3">
                    <h6 class="text-uppercase text-muted small fw-bold mb-3">Garbage ID</h6>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="h4 mb-0" id="garbage-id-val">0</span>
                    </div>
                </div>
                <div class="card stat-card p-3 mb-3">
                    <h6 class="text-uppercase text-muted small fw-bold mb-3">Garbage Location</h6>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="h4 mb-0" id="garbage-x">0</span>
                        <span class="badge bg-secondary">x (mm)</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="h4 mb-0" id="garbage-y">0</span>
                        <span class="badge bg-secondary">y (mm)</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="h4 mb-0" id="garbage-valid">No</span>
                        <span class="badge bg-secondary">Target valid?</span>
                    </div>
                </div>

                <div class="card stat-card p-3 mb-3">
                    <h6 class="text-uppercase text-muted small fw-bold mb-3">Basket Location</h6>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="h4 mb-0" id="basket-x">0</span>
                        <span class="badge bg-secondary">x (mm)</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="h4 mb-0" id="basket-y">0</span>
                        <span class="badge bg-secondary">y (mm)</span>
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="h4 mb-0" id="basket-valid">No</span>
                        <span class="badge bg-secondary">Target valid?</span>
                    </div>
                </div>

            </div>
        </div>
    </div>
</body>
</html>
